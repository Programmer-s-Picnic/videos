<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Programmer's Picnic AI-ML Outro Banner</title>

<style>
:root {
  --saffron:#f59e0b;
  --gold:#ffd166;
  --deep:#7c2d12;
  --dark:#241102;
  --cream:#fff7e6;
  --white:#ffffff;
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#2b1605;
  color:var(--white);
}

.toolbar {
  padding:12px;
  background:#3b1d06;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

button {
  padding:10px 16px;
  border:0;
  border-radius:999px;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(90deg,#ffd166,#f59e0b);
  color:#331400;
}

.banner {
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:5%;
  background:
    radial-gradient(circle at 18% 20%, rgba(255,209,102,.42), transparent 28%),
    radial-gradient(circle at 76% 34%, rgba(255,255,255,.18), transparent 28%),
    linear-gradient(135deg,#fff7e6 0%,#f59e0b 46%,#7c2d12 100%);
}

.banner::before {
  content:"";
  position:absolute;
  inset:28px;
  border:3px solid rgba(255,255,255,.60);
  border-radius:32px;
  pointer-events:none;
}

.banner::after {
  content:"</>  AI  ML  Python  NumPy  Projects  Keep Coding";
  position:absolute;
  left:4%;
  right:4%;
  bottom:6%;
  color:rgba(255,255,255,.18);
  font-size:clamp(20px,3vw,52px);
  font-weight:1000;
  letter-spacing:8px;
  white-space:nowrap;
  overflow:hidden;
}

.left {
  width:61%;
  z-index:2;
  color:#2b1300;
}

.badge {
  display:inline-block;
  padding:12px 22px;
  border-radius:999px;
  background:#2b1300;
  color:#ffd166;
  font-weight:900;
  font-size:clamp(18px,2vw,32px);
  margin-bottom:18px;
}

h1 {
  margin:0;
  font-size:clamp(62px,9vw,138px);
  line-height:.85;
  font-weight:1000;
  letter-spacing:-4px;
  text-transform:uppercase;
  color:#fff;
  text-shadow:5px 5px 0 #7c2d12, 0 18px 40px rgba(0,0,0,.24);
}

h2 {
  margin:18px 0 8px;
  font-size:clamp(30px,4.3vw,70px);
  color:#2b1300;
  background:rgba(255,255,255,.82);
  display:inline-block;
  padding:12px 24px;
  border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,.22);
}

p {
  margin:12px 0;
  font-size:clamp(22px,2.6vw,42px);
  font-weight:900;
}

.message {
  margin-top:22px;
  padding:16px 22px;
  border-radius:22px;
  background:#2b1300;
  color:#fff7e6;
  display:inline-block;
  font-size:clamp(20px,2.3vw,36px);
  font-weight:900;
  box-shadow:0 20px 45px rgba(0,0,0,.25);
}

.domains {
  margin-top:20px;
  padding:14px 22px;
  border-radius:999px;
  background:rgba(255,255,255,.86);
  color:#3b1d06;
  display:inline-block;
  font-size:clamp(17px,1.8vw,30px);
  font-weight:900;
  box-shadow:0 18px 45px rgba(0,0,0,.20);
}

.photo {
  width:33%;
  height:78%;
  z-index:2;
  border-radius:32px;
  border:8px solid rgba(255,255,255,.78);
  box-shadow:0 30px 80px rgba(0,0,0,.40);
  overflow:hidden;
  background:#fff7e6;
}

.photo img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
}

[contenteditable] {
  outline:2px dashed transparent;
  border-radius:8px;
}

[contenteditable]:hover,
[contenteditable]:focus {
  outline-color:#2b1300;
  background:rgba(255,255,255,.22);
}

@media(max-width:800px){
  .banner{padding:4%;}
  .photo{width:34%;height:70%;}
}

/* Extra image / logo option */
.toolbar .hint {
  color:#fff7e6;
  font-size:13px;
  font-weight:700;
  opacity:.9;
}

.extra-logo {
  position:absolute;
  z-index:4;
  right:5.8%;
  top:7.5%;
  width:clamp(72px,8vw,132px);
  aspect-ratio:1/1;
  border-radius:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.88);
  border:5px solid rgba(43,19,0,.72);
  box-shadow:0 20px 45px rgba(0,0,0,.30);
  cursor:move;
  user-select:none;
  touch-action:none;
  overflow:hidden;
}

.extra-logo img {
  width:78%;
  height:78%;
  object-fit:contain;
  pointer-events:none;
}

.extra-logo .placeholder-icon {
  width:74%;
  height:74%;
  display:grid;
  place-items:center;
  border-radius:22px;
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
  color:white;
  font-size:clamp(30px,4vw,58px);
  font-weight:1000;
  letter-spacing:-4px;
  font-family:Arial, Helvetica, sans-serif;
}

.extra-logo.hidden { display:none; }

@media(max-width:800px){
  .extra-logo{right:4%;top:5%;width:76px;border-radius:20px;}
}

</style>
</head>

<body>

<div class="toolbar">
  <button onclick="downloadPNG()">Download PNG</button>
  <button onclick="goFullScreen()">Full Screen</button>
  <input id="extraLogoPicker" type="file" accept="image/*" hidden onchange="loadExtraLogo(event)">
  <button onclick="document.getElementById('extraLogoPicker').click()">Add / Change Extra Image</button>
  <button onclick="toggleExtraLogo()">Show / Hide Extra Image</button>
  <span class="hint">Tip: drag the extra image anywhere on the banner.</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
function downloadPNG(){
  html2canvas(document.getElementById("banner"),{scale:2}).then(canvas=>{
    const a=document.createElement("a");
    a.download="programmers-picnic-ai-ml-outro-saffron.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}

function goFullScreen(){
  const el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
}

function loadExtraLogo(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    const box = document.getElementById("extraLogo");
    box.classList.remove("hidden");
    box.innerHTML = `<img src="${e.target.result}" alt="Extra image or logo">`;
  };
  reader.readAsDataURL(file);
}

function toggleExtraLogo(){
  document.getElementById("extraLogo").classList.toggle("hidden");
}

(function makeExtraLogoDraggable(){
  const logo = document.getElementById("extraLogo");
  const banner = document.getElementById("banner");
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  function startDrag(e){
    dragging = true;
    const pointer = e.touches ? e.touches[0] : e;
    const rect = logo.getBoundingClientRect();
    offsetX = pointer.clientX - rect.left;
    offsetY = pointer.clientY - rect.top;
    e.preventDefault();
  }

  function moveDrag(e){
    if(!dragging) return;
    const pointer = e.touches ? e.touches[0] : e;
    const bannerRect = banner.getBoundingClientRect();
    const logoRect = logo.getBoundingClientRect();
    let x = pointer.clientX - bannerRect.left - offsetX;
    let y = pointer.clientY - bannerRect.top - offsetY;
    x = Math.max(0, Math.min(x, bannerRect.width - logoRect.width));
    y = Math.max(0, Math.min(y, bannerRect.height - logoRect.height));
    logo.style.left = x + "px";
    logo.style.top = y + "px";
    logo.style.right = "auto";
  }

  function endDrag(){ dragging = false; }

  logo.addEventListener("mousedown", startDrag);
  logo.addEventListener("touchstart", startDrag, {passive:false});
  window.addEventListener("mousemove", moveDrag);
  window.addEventListener("touchmove", moveDrag, {passive:false});
  window.addEventListener("mouseup", endDrag);
  window.addEventListener("touchend", endDrag);
})();

</script>
