<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Programmer's Picnic Outro</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#fff4d6,#f59e0b);
  font-family: 'Inter', sans-serif;
  overflow:hidden;
}

.container{
  text-align:center;
}

h1{
  font-size:48px;
  color:#2b2112;
  margin-bottom:10px;
  animation: fadeIn 2s ease;
}

p{
  font-size:20px;
  color:#6b5a3d;
  animation: fadeIn 3s ease;
}

.subscribe{
  margin-top:20px;
  padding:12px 24px;
  background:#d97706;
  color:#fff;
  border-radius:30px;
  display:inline-block;
  font-weight:bold;
  animation: pulse 2s infinite;
}

.cards{
  margin-top:30px;
  display:flex;
  gap:20px;
  justify-content:center;
}

.card{
  width:180px;
  height:100px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">
  <h1>Programmer's Picnic</h1>
  <p>Keep coding. Keep growing.</p>

  <div class="cards">
    <div class="card"></div>
    <div class="card"></div>
  </div>

  <div class="subscribe">Subscribe Now</div>
</div>

</body>
</html>
