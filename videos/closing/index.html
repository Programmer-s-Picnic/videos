<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Programmer's Picnic — Premium Outro</title>

<style>
:root{
  --bg:#0b0b0b;
  --glow:#f59e0b;
  --glow2:#d97706;
  --text:#ffffff;
}

body{
  margin:0;
  height:100vh;
  background: radial-gradient(circle at center, #1a1200, #000);
  font-family: 'Inter', sans-serif;
  overflow:hidden;
  color:var(--text);
}

/* floating code */
.code{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0.05;
  font-size:14px;
  color:#f59e0b;
  animation: scroll 20s linear infinite;
}

@keyframes scroll{
  from{transform:translateY(0);}
  to{transform:translateY(-200px);}
}

/* center content */
.container{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* title */
.title{
  font-size:48px;
  letter-spacing:1px;
  opacity:0;
  animation: fadeIn 2s forwards;
}

.subtitle{
  font-size:20px;
  opacity:0;
  margin-top:10px;
  animation: fadeIn 3s forwards;
}

/* typing */
.typing{
  margin-top:20px;
  font-size:24px;
  border-right:2px solid var(--glow);
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 3s steps(20,end) forwards, blink 1s infinite;
  animation-delay:2s;
}

@keyframes typing{
  from{width:0;}
  to{width:220px;}
}

@keyframes blink{
  50%{border-color:transparent;}
}

/* cards */
.cards{
  position:absolute;
  bottom:80px;
  display:flex;
  gap:30px;
  opacity:0;
  animation: slideUp 2s forwards;
  animation-delay:5s;
}

.card{
  width:200px;
  height:120px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  backdrop-filter: blur(6px);
  border:1px solid rgba(255,255,255,0.1);
}

/* subscribe */
.subscribe{
  position:absolute;
  bottom:20px;
  padding:12px 28px;
  background:linear-gradient(45deg,var(--glow),var(--glow2));
  border-radius:40px;
  font-weight:bold;
  opacity:0;
  animation: slideUp 2s forwards, pulse 2s infinite;
  animation-delay:5s;
}

@keyframes fadeIn{
  to{opacity:1;}
}

@keyframes slideUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<!-- fake code background -->
<div class="code">
  function learn(){ return "build"; }
  const success = learn() + " mastery";
</div>

<div class="container">
  <div class="title">Programmer’s Picnic</div>
  <div class="subtitle">with Champak Roy</div>

  <div class="typing">Learn. Build. Master.</div>
</div>

<div class="cards">
  <div class="card"></div>
  <div class="card"></div>
</div>

<div class="subscribe">Subscribe</div>

</body>
</html>
