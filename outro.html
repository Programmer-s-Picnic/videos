<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Outro - Programmer's Picnic</title>

    <style>
      :root {
        --bg: #0b0b0b;
        --glow: #f59e0b;
        --glow2: #d97706;
        --text: #ffffff;
      }

      body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #1a1200, #000);
        font-family: "Inter", sans-serif;
        color: var(--text);
        overflow: hidden;
      }

      /* background animation */
      .bg {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0.1;
        background: repeating-linear-gradient(
          transparent,
          transparent 3px,
          rgba(245, 158, 11, 0.1) 4px
        );
        animation: move 12s linear infinite;
      }

      @keyframes move {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-200px);
        }
      }

      /* main container */
      .container {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      /* text */
      .tagline {
        font-size: 28px;
        margin-bottom: 20px;
        animation: fadeIn 2s forwards;
      }

      /* video placeholders */
      .cards {
        display: flex;
        gap: 30px;
        margin-top: 20px;
      }

      .card {
        width: 240px;
        height: 140px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(6px);
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.05);
        border-color: var(--glow);
      }

      /* subscribe button */
      .subscribe {
        margin-top: 30px;
        padding: 14px 30px;
        border-radius: 40px;
        background: linear-gradient(45deg, var(--glow), var(--glow2));
        font-weight: bold;
        cursor: pointer;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="bg"></div>

    <div class="container">
      <div class="tagline">Keep coding. Keep growing.</div>

      <div>Watch Next</div>

      <div class="cards">
        <div class="card"></div>
        <div class="card"></div>
      </div>

      <div class="subscribe">Subscribe</div>
    </div>
  </body>
</html>
